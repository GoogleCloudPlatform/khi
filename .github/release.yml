changelog:
  categories:
    - title: New features 🎉
      labels:
        - features
    - title: Bug Fixes 🐛
      labels:
        - bug
    - title: CI/CD ⚙️
      labels:
        - cicd
    - title: Development Environment 💻
      labels:
        - devenv
    - title: Documentation 📝
      labels:
        - documentation
    - title: Other Changes 🛠
      labels:
        - "*"
      exclude:
        labels:
          - features
          - bug
          - cicd
          - devenv
          - documentation
    - title: Dependencies ⏫
      labels:
        - dependencies
