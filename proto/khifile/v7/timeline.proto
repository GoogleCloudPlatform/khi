syntax = "proto3";

package khifile.v7;

import "google/protobuf/timestamp.proto";
import "khifile/v7/shared.proto";

option go_package = "github.com/GoogleCloudPlatform/khi/pkg/generated/khifile/v7;khifilev7";

message TimelineChunk {
   repeated Timeline timelines = 1;
   repeated TimelineItems timeline_items = 2;
   repeated Revision revisions = 3;
   repeated Event events = 4;
   repeated ResourceBody resourceBodies = 6; // Field 5 was removed (Identity)
}

message Timeline {
   uint32 id = 1;
   uint32 timeline_type = 2;
   uint32 name_string_id = 3; // An ID of InternString message
   uint32 timeline_items_id = 4; // An ID of TimelineItems message
   uint32 parent_timeline_id = 5; // 0 means no parent
}

message TimelineItems { // Multiple Timeline may share the same list of revisions and events. Thus Timeline holds this information by referencing TimelineItems with Id.
   uint32 id = 1;
   repeated uint32 revision_ids = 2; // List of Revision message IDs
   repeated uint32 event_ids = 3; // List of Event message IDs
}

message Revision {
   uint32 id = 1;
   uint32 log_id = 2; // An ID of a Log defined in Log chunk
   google.protobuf.Timestamp changedTime = 3;
   Struct resource_body = 4;
   uint32 principal_string_id = 5; // An ID of InternString message
   uint32 verb_type = 6;
   uint32 state_type = 7;
}

message Event {
   uint32 id = 1;
   uint32 log_id = 2; // An ID of a Log defined in Log chunk
}

message ResourceBody {
   uint32 id = 1;
   Struct body = 2;
}
