syntax = "proto3";

package khifile.v7;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/GoogleCloudPlatform/khi/pkg/generated/khifile/v7;khifilev7";

// `Struct` represents a structured data value, consisting of fields
// corresponding to a FieldPath.
message Struct {
  // The ID of the field path in InterningPoolChunk.
  // A field path is an ordered list of field names (represented as interned string IDs).
  // The `values` array aligns with this field path order.
  //
  // Example:
  // If a JSON object is `{"verb": "create", "user": "alice"}`,
  // the field path would be the list of interned IDs for `["verb", "user"]`.
  // If the IDs for "verb" and "user" are 10 and 11 respectively, the field path is `[10, 11]`.
  // The `values` array would contain the values for "create" and "alice" in that order.
  //
  // Example (Flattened):
  // If a nested JSON object is `{"metadata": {"name": "pod-1", "namespace": "default"}}`,
  // it can be flattened into a single field path `["metadata\0name","metadata\0namespace"]`.
  // If the IDs for "metadata\0name" is 20 , and "metadata\0namespace" is 21, the field path is [20, 21].
  // The `values` array would contain the single string value "pod-1".
  uint32 field_path_set_id = 1;

  // Values corresponding to the field path order.
  repeated Value values = 2;
}

// `Value` represents a dynamically typed value which can be either
// null, a number, a string, a boolean, a recursive struct value, or a
// list of values. A producer of value is expected to set one of these
// variants. Absence of any variant indicates an error.
message Value {
  // The kind of value.
  oneof kind {
    // Represents a null value.
    NullValue null_value = 1;
    // Represents a double value.
    double number_value = 2;
    // Represents a string value.
    uint32 string_value = 3; // the id in InterningPoolChunk
    // Represents a boolean value.
    bool bool_value = 4;
    // Represents a structured value.
    Struct struct_value = 5;
    // Represents a repeated `Value`.
    ListValue list_value = 6;
    // Represents a timestamp value.
    google.protobuf.Timestamp timestamp_value = 7;
  }
}

// `NullValue` is a singleton enumeration to represent the null value for the
// `Value` type union.
enum NullValue {
  // Null value.
  NULL_VALUE = 0;
}

// `ListValue` is a wrapper around a repeated field of values.
message ListValue {
  // Repeated field of dynamically typed values.
  repeated Value values = 1;
}
