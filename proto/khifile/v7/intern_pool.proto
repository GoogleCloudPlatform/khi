syntax = "proto3";

package khifile.v7;

option go_package = "github.com/GoogleCloudPlatform/khi/pkg/generated/khifile/v7;khifilev7";

message InterningPoolChunk {
   repeated InternString strings = 1;
   repeated InternFieldPathSet field_path_sets = 2;
}

message InternString {
   uint32 id = 1;
   string value = 2;
}

message InternFieldPathSet {
   uint32 id = 1;
   repeated uint32 field_names = 2; // Array of interned string IDs
}
