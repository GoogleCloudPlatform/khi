syntax = "proto3";

package khifile.v7;

import "google/protobuf/timestamp.proto";
import "khifile/v7/shared.proto";

option go_package = "github.com/GoogleCloudPlatform/khi/pkg/generated/khifile/v7;khifilev7";

message LogChunk{
  repeated Log logs = 1;
}

message Log{
   uint32 id = 1;
   google.protobuf.Timestamp ts = 2;
   Struct body = 3;
   uint32 summary_string_id = 4;
   uint32 log_type_id = 5;
   uint32 severity_type_id = 6; 
}
