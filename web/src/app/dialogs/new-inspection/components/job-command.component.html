<mat-card>
  <mat-card-header class="job-command-card-header">
    <mat-card-title>Run as job command</mat-card-title>
    <div class="job-command-actions">
      <button
        mat-icon-button
        matTooltip="Copy to clipboard"
        (click)="copyCommand()"
      >
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <p>Run the following command to execute this inspection in job mode.</p>
    <pre class="job-command-pre">{{ command() }}</pre>
  </mat-card-content>
</mat-card>
