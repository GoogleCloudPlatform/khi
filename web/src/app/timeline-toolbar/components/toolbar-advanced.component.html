<div class="container">
  <div class="toolbar">
    <div class="toolbar-grid">
      <div class="left-control">
        <!-- Switch to standard mode button -->
        <button
          mat-icon-button
          color="primary"
          (click)="switchToStandard.emit()"
          matTooltip="Switch to Standard mode"
        >
          <mat-icon>saved_search</mat-icon>
        </button>
      </div>
      <div class="center-control">
        <div class="cel-inputs-grid">
          <khi-timeline-cel-input
            [errorMessage]="timelineCelError()"
            tooltip="Timeline CEL"
            icon="view_timeline"
            placeholder='e.g. match("kind", "pod") && !match("namespace", "kube-system")'
            [(value)]="timelineCelFilter"
            (focused)="onTimelineCelFocus()"
          ></khi-timeline-cel-input>
          <khi-timeline-cel-input
            [errorMessage]="logCelError()"
            tooltip="Log CEL"
            icon="notes"
            placeholder='e.g. body("jsonPayload.message","error") && severity == "ERROR"'
            [(value)]="logCelFilter"
            (focused)="onLogCelFocus()"
          ></khi-timeline-cel-input>
        </div>
      </div>
      <div class="right-control">
        <!-- Help button -->
        <button
          mat-icon-button
          color="primary"
          cdkOverlayOrigin
          #helpOverlayOrigin="cdkOverlayOrigin"
          (click)="helpPopupOpen.set(!helpPopupOpen())"
          matTooltip="CEL expression guide"
        >
          <mat-icon>help_outline</mat-icon>
        </button>

        <!-- Help popover guide overlay template -->
        <ng-template
          cdkConnectedOverlay
          [cdkConnectedOverlayOrigin]="helpOverlayOrigin"
          [cdkConnectedOverlayOpen]="helpPopupOpen()"
          [cdkConnectedOverlayHasBackdrop]="false"
          [cdkConnectedOverlayPositions]="overlayPositions"
        >
          <khi-cel-guide-popup
            [(activeTab)]="helpActiveTab"
          ></khi-cel-guide-popup>
        </ng-template>

        <!-- Settings button -->
        <button
          mat-icon-button
          color="primary"
          cdkOverlayOrigin
          #settingsOverlayOrigin="cdkOverlayOrigin"
          (click)="settingsPopupOpen.set(!settingsPopupOpen())"
          matTooltip="Filter settings"
        >
          <mat-icon>settings</mat-icon>
        </button>

        <!-- Settings popover dropdown overlay template -->
        <ng-template
          cdkConnectedOverlay
          [cdkConnectedOverlayOrigin]="settingsOverlayOrigin"
          [cdkConnectedOverlayOpen]="settingsPopupOpen()"
          [cdkConnectedOverlayHasBackdrop]="true"
          (backdropClick)="settingsPopupOpen.set(false)"
        >
          <khi-timeline-toolbar-settings
            [(hideTimelinesWithoutMatchingLogs)]="
              hideTimelinesWithoutMatchingLogs
            "
          ></khi-timeline-toolbar-settings>
        </ng-template>
        <div class="timezone-control">
          <p>UTC+</p>
          <input
            class="timezone-input"
            type="number"
            value="0"
            name="timezone-shift"
            [value]="timezoneShift()"
            (change)="onTimezoneshiftCommit($event)"
          />
          <p>hours</p>
        </div>
        <button
          mat-raised-button
          color="primary"
          [disabled]="logOrTimelineNotSelected()"
          (click)="drawDiagram.emit()"
          matTooltip="Draw diagram at the point of the timeline"
        >
          <mat-icon class="draw-diagram-button-icon">family_history</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
