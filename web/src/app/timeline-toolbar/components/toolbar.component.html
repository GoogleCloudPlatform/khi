<div class="container">
  <div class="toolbar">
    <div class="toolbar-grid">
      <div class="button-group">
        <!-- Switch to advanced mode button -->
        <button
          mat-icon-button
          color="primary"
          (click)="switchToAdvanced.emit()"
          matTooltip="Switch to advanced filter mode"
        >
          <mat-icon>search_gear</mat-icon>
        </button>
      </div>
      <div class="center-control">
        <div class="filter-list">
          @for (filter of timelineFilters(); track filter.id) {
            <button
              mat-stroked-button
              class="filter-badge"
              [class.action-exclude]="filter.action === 'exclude'"
              [matTooltip]="getFilterTooltip(filter)"
              (click)="openEditFilterPopup(filter)"
              [style.--badge-bg]="getTypeRowBgColor(filter.timelineType)"
              [style.--badge-fg]="getTypeRowColor(filter.timelineType)"
              [style.--badge-border]="getTypeRowColor(filter.timelineType)"
              [style.--badge-type-bg]="getTypeChipBgColor(filter.timelineType)"
              [style.--badge-type-fg]="getTypeChipColor(filter.timelineType)"
            >
              <mat-icon class="filter-icon">
                {{
                  typeIcons()[filter.timelineType.toLowerCase()] || "filter_alt"
                }}
              </mat-icon>
              <span class="filter-label">
                @if (filter.action === "exclude") {
                  <span class="action-tag exclude">Exclude</span>
                }
                <span class="filter-type">{{ filter.timelineType }}</span
                ><span class="filter-colon">: </span
                ><span class="filter-value">{{
                  getFilterValueDisplay(filter)
                }}</span>
              </span>
              <mat-icon
                class="delete-icon"
                (click)="$event.stopPropagation(); deleteFilter(filter.id)"
              >
                close
              </mat-icon>
            </button>
          }

          <button
            mat-stroked-button
            color="primary"
            class="add-filter-btn"
            (click)="toggleFilterBuilder()"
            #builderTrigger="cdkOverlayOrigin"
            cdkOverlayOrigin
            matTooltip="Add timeline filter"
          >
            <mat-icon>add</mat-icon>
            <span>Add filter</span>
          </button>
        </div>

        <div class="log-filters">
          <mat-form-field appearance="outline" class="severity-select">
            <mat-label>Min Severity</mat-label>
            <mat-select
              [value]="selectedSeverity()"
              (selectionChange)="selectedSeverity.set($event.value)"
            >
              <mat-option value="ANY">Any</mat-option>
              <mat-option value="INFO">INFO</mat-option>
              <mat-option value="WARNING">WARNING</mat-option>
              <mat-option value="ERROR">ERROR</mat-option>
              <mat-option value="FATAL">FATAL</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="search-input">
            <mat-icon matPrefix class="search-prefix-icon">search</mat-icon>
            <mat-label>Search Logs</mat-label>
            <input
              #logSearchInput
              matInput
              placeholder="Search in log body..."
              [value]="logSearchQuery()"
              (input)="logSearchQuery.set($any($event.target).value)"
            />
            @if (logSearchQuery()) {
              <button
                matSuffix
                mat-icon-button
                aria-label="Clear"
                (click)="logSearchQuery.set('')"
                class="clear-search-btn"
              >
                <mat-icon>close</mat-icon>
              </button>
            }
          </mat-form-field>
        </div>
      </div>
      <div class="right-control">
        <div class="timezone-control">
          <p>UTC+</p>
          <input
            class="timezone-input"
            type="number"
            value="0"
            name="timezone-shift"
            [value]="timezoneShift()"
            (change)="onTimezoneshiftCommit($event)"
          />
          <p>hours</p>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="builderTrigger"
  [cdkConnectedOverlayOpen]="isFilterBuilderOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="toggleFilterBuilder()"
>
  <khi-timeline-filter-builder
    [timelineTypes]="timelineTypes()"
    [candidates]="candidates()"
    [typeCandidateCounts]="typeCandidateCounts()"
    [showDeleteButton]="editingFilter() !== null"
    [(selectedTimelineType)]="selectedTimelineTypeForBuilder"
    [(filterMode)]="builderFilterMode"
    [(filterAction)]="builderFilterAction"
    [(regexValue)]="builderRegexValue"
    [(selectedCandidates)]="builderSelectedCandidates"
    (closeButtonClicked)="toggleFilterBuilder()"
    (deleteButtonClicked)="deleteFilter(editingFilter()!.id)"
    (confirm)="onFilterAddConfirm($event)"
  ></khi-timeline-filter-builder>
</ng-template>
