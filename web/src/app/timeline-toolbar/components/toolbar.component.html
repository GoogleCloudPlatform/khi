<div class="container">
  <div class="toolbar">
    <div class="toolbar-grid">
      <div class="smaller-input left-control">
        <div class="button-group">
          <!-- Switch to advanced mode button -->
          <button
            mat-icon-button
            color="primary"
            (click)="switchToAdvanced.emit()"
            matTooltip="Switch to advanced filter mode"
          >
            <mat-icon>search_gear</mat-icon>
          </button>
        </div>
        <div class="center-control"></div>
        <div class="right-control">
          <mat-button-toggle-group multiple>
            <mat-button-toggle
              value="filter_resource"
              matTooltip="hide timelines without any logs matched by the log filter on it or its children"
              [checked]="hideTimelinesWithoutMatchingLogs()"
              (change)="
                hideTimelinesWithoutMatchingLogs.set(
                  !hideTimelinesWithoutMatchingLogs()
                )
              "
            >
              <mat-icon color="primary">description</mat-icon>
              <mat-icon color="primary">search_off</mat-icon>
            </mat-button-toggle>
          </mat-button-toggle-group>
          <khi-timeline-regex-input
            #logFilterInput
            class="log-filter"
            label="Log body(regex)"
            [(value)]="logFilter"
          ></khi-timeline-regex-input>
          <div class="timezone-control">
            <p>UTC+</p>
            <input
              class="timezone-input"
              type="number"
              value="0"
              name="timezone-shift"
              [value]="timezoneShift()"
              (change)="onTimezoneshiftCommit($event)"
            />
            <p>hours</p>
          </div>
          <button
            mat-raised-button
            color="primary"
            [disabled]="logOrTimelineNotSelected()"
            (click)="drawDiagram.emit()"
            matTooltip="Draw diagram at the point of the timeline"
          >
            <mat-icon class="draw-diagram-button-icon">family_history</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
