<div class="popup-card">
  <div class="popup-header">
    <div class="tab-bar">
      <button
        class="tab-button"
        [class.active]="activeTab() === CelGuideTab.Overview"
        (click)="activeTab.set(CelGuideTab.Overview)"
      >
        Overview
      </button>
      <button
        class="tab-button"
        [class.active]="activeTab() === CelGuideTab.TimelineCel"
        (click)="activeTab.set(CelGuideTab.TimelineCel)"
      >
        Timeline filter
      </button>
      <button
        class="tab-button"
        [class.active]="activeTab() === CelGuideTab.LogCel"
        (click)="activeTab.set(CelGuideTab.LogCel)"
      >
        Log filter
      </button>
    </div>
  </div>

  <div class="popup-body">
    @switch (activeTab()) {
      @case (CelGuideTab.Overview) {
        <khi-cel-guide-overview></khi-cel-guide-overview>
      }
      @case (CelGuideTab.TimelineCel) {
        <khi-cel-guide-timeline-cel></khi-cel-guide-timeline-cel>
      }
      @case (CelGuideTab.LogCel) {
        <khi-cel-guide-log-cel></khi-cel-guide-log-cel>
      }
    }
  </div>
</div>
