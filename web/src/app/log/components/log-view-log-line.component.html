@let logEntry = log();
<div
  class="log-row"
  (mouseover)="onHover()"
  (click)="onClick()"
  [matTooltip]="logEntry.summary"
  matTooltipPosition="left"
  [class.selected]="selected()"
  [class.highlight]="highlighted()"
>
  <div
    class="type-indicator"
    [ngStyle]="typeStyle()"
    [matTooltip]="'log type:' + logEntry.logType.label"
  ></div>
  <div class="severity-indicator-wrap">
    <div
      class="severity-indicator"
      [ngStyle]="severityStyle()"
      [matTooltip]="'severity:' + logEntry.severity.label"
    >
      {{ logEntry.severity.shortLabel }}
    </div>
  </div>
  <div class="ts">{{ logEntry.legacyTimestampMs | tsf | async }}</div>
  <div class="message">{{ logEntry.summary }}</div>
</div>
