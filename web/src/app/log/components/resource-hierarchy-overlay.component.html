<div class="overlay-card">
  <div class="header">
    <mat-icon class="header-icon">account_tree</mat-icon>
    <span class="header-title">Resource hierarchy</span>
  </div>
  <div class="nodes-container">
    @for (node of pathNodes(); track node.id; let i = $index) {
      <div
        class="node-row"
        [style]="getTimelineStyle(node.type)"
        [style.padding-left.px]="i * 12 + 4"
      >
        @if (i > 0) {
          <span class="tree-line">└</span>
        }
        @if (node.type.icon) {
          <mat-icon class="node-icon">{{ node.type.icon }}</mat-icon>
        }
        <span class="node-label">{{ node.label }}</span>
        @if (node.type.label) {
          <span class="type-chip">{{ node.type.label }}</span>
        }
      </div>
    }
  </div>
</div>
