<khi-header-smart></khi-header-smart>
<div>
  @let k = kind();
  @if (k) {
    <khi-copiable-key-value
      icon="workspaces"
      label="Kind"
      [value]="k"
    ></khi-copiable-key-value>
  }
  @let ns = namespace();
  @if (ns) {
    <khi-copiable-key-value
      icon="folder"
      label="Namespace"
      [value]="ns"
    ></khi-copiable-key-value>
  }
  @let n = name();
  @if (n) {
    <khi-copiable-key-value
      icon="description"
      label="Name"
      [value]="n"
    ></khi-copiable-key-value>
  }
  @let sr = subresource();
  @if (sr) {
    <khi-copiable-key-value
      icon="page_info"
      label="Subresource"
      [value]="sr"
    ></khi-copiable-key-value>
  }
</div>
@if (timeline() === null) {
  <div>
    <p class="empty-message">No resource selected</p>
  </div>
} @else {
  @if (changePair | async; as pair) {
    <div class="diff">
      <ng-container>
        <khi-diff-toolbar
          [showOpenInNewTabButton]="false"
          [(showManagedFields)]="showManagedFields"
          (copyContent)="copy(currentContent())"
        ></khi-diff-toolbar>
        <div class="diff-inner">
          @if (pair.previous && previousContent()) {
            <ngx-side-by-side-diff
              class="ngx-diff-light-theme"
              [before]="previousContent()"
              [after]="currentContent()"
            >
            </ngx-side-by-side-diff>
          } @else {
            <ngx-side-by-side-diff
              class="ngx-diff-light-theme"
              before=""
              [after]="currentContent()"
            ></ngx-side-by-side-diff>
          }
        </div>
      </ng-container>
    </div>
  }
}
